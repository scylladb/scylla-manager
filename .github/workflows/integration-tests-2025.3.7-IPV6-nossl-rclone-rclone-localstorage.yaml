concurrency:
    cancel-in-progress: true
    group: int-${{ github.workflow }}-${{ github.ref }}
env:
    scylla-version: scylla:2025.3.7
    ip-family: IPV6
    raft-schema: none
    tablets: disabled
    ssl-enabled: "false"
    backup-method: rclone
    restore-method: rclone
    backup-provider: localstorage
jobs:
    backup:
        name: Test backup
        runs-on: ubuntu-latest
        steps:
            - name: Check out code into the Go module directory
              uses: actions/checkout@v3
            - name: Setup testing dependencies
              uses: ./.github/actions/test-setup
              with:
                backup-provider: ${{ env.backup-provider }}
                ip-family: ${{ env.ip-family }}
                raft-schema: ${{ env.raft-schema }}
                scylla-version: ${{ env.scylla-version }}
                ssl-enabled: ${{ env.ssl-enabled }}
                tablets: ${{ env.tablets }}
            - name: Run tests
              run: make pkg-integration-test IP_FAMILY=${{ env.ip-family }} SSL_ENABLED=${{ env.ssl-enabled}} BACKUP_METHOD=${{ env.backup-method }} RESTORE_METHOD=${{ env.restore-method }} BACKUP_PROVIDER=${{ env.backup-provider }} PKG=./pkg/service/backup
    repair:
        name: Test repair
        runs-on: ubuntu-latest
        steps:
            - name: Check out code into the Go module directory
              uses: actions/checkout@v3
            - name: Setup testing dependencies
              uses: ./.github/actions/test-setup
              with:
                backup-provider: ${{ env.backup-provider }}
                ip-family: ${{ env.ip-family }}
                raft-schema: ${{ env.raft-schema }}
                scylla-version: ${{ env.scylla-version }}
                ssl-enabled: ${{ env.ssl-enabled }}
                tablets: ${{ env.tablets }}
            - name: Run tests
              run: make pkg-integration-test IP_FAMILY=${{ env.ip-family }} SSL_ENABLED=${{ env.ssl-enabled}} PKG=./pkg/service/repair
            - name: Run tablet repair tests
              run: make pkg-integration-test IP_FAMILY=${{ env.ip-family }} SSL_ENABLED=${{ env.ssl-enabled}} PKG=./pkg/service/repair/tablet
    restore-schema:
        name: Test restore schema
        runs-on: ubuntu-latest
        steps:
            - name: Check out code into the Go module directory
              uses: actions/checkout@v3
            - name: Setup testing dependencies
              uses: ./.github/actions/test-setup
              with:
                backup-provider: ${{ env.backup-provider }}
                ip-family: ${{ env.ip-family }}
                raft-schema: ${{ env.raft-schema }}
                scylla-version: ${{ env.scylla-version }}
                ssl-enabled: ${{ env.ssl-enabled }}
                tablets: ${{ env.tablets }}
            - name: Run tests
              run: make pkg-integration-test IP_FAMILY=${{ env.ip-family }} SSL_ENABLED=${{ env.ssl-enabled}} BACKUP_METHOD=${{ env.backup-method }} RESTORE_METHOD=${{ env.restore-method }} BACKUP_PROVIDER=${{ env.backup-provider }} PKG=./pkg/service/restore RUN='"TestRestore([^T]|.{1}[^a]|.{2}[^b]|.{3}[^l]|.{4}[^e]|.{5}[^s]).*Integration"'
    restore-tables:
        name: Test restore tables
        runs-on: ubuntu-latest
        steps:
            - name: Check out code into the Go module directory
              uses: actions/checkout@v3
            - name: Setup testing dependencies
              uses: ./.github/actions/test-setup
              with:
                backup-provider: ${{ env.backup-provider }}
                ip-family: ${{ env.ip-family }}
                raft-schema: ${{ env.raft-schema }}
                scylla-version: ${{ env.scylla-version }}
                ssl-enabled: ${{ env.ssl-enabled }}
                tablets: ${{ env.tablets }}
            - name: Run tests
              run: make pkg-integration-test IP_FAMILY=${{ env.ip-family }} SSL_ENABLED=${{ env.ssl-enabled}} BACKUP_METHOD=${{ env.backup-method }} RESTORE_METHOD=${{ env.restore-method }} BACKUP_PROVIDER=${{ env.backup-provider }} PKG=./pkg/service/restore RUN='"TestRestoreTables.*Integration"'
    small-pkg:
        name: Test other, smaller packages
        runs-on: ubuntu-latest
        steps:
            - name: Check out code into the Go module directory
              uses: actions/checkout@v3
            - name: Set IP_FAMILY and SSL_ENABLED var for all tests
              run: |
                echo "IP_FAMILY=${{ env.ip-family }}" >> $GITHUB_ENV
                echo "SSL_ENABLED=${{ env.ssl-enabled }}" >> $GITHUB_ENV
            - name: Setup testing dependencies
              uses: ./.github/actions/test-setup
              with:
                backup-provider: ${{ env.backup-provider }}
                ip-family: ${{ env.ip-family }}
                raft-schema: ${{ env.raft-schema }}
                scylla-version: ${{ env.scylla-version }}
                ssl-enabled: ${{ env.ssl-enabled }}
                tablets: ${{ env.tablets }}
            - name: Run cqlping tests
              run: make pkg-integration-test PKG=./pkg/ping/cqlping
            - name: Run dynamoping tests
              run: make pkg-integration-test PKG=./pkg/ping/dynamoping
            - name: Run scyllaclient tests
              run: make pkg-integration-test BACKUP_PROVIDER=${{ env.backup-provider }} PKG=./pkg/scyllaclient
            - name: Run cluster tests
              run: make pkg-integration-test PKG=./pkg/service/cluster
            - name: Run healthcheck tests
              run: make pkg-integration-test PKG=./pkg/service/healthcheck
            - name: Run scheduler tests
              run: make pkg-integration-test PKG=./pkg/service/scheduler
            - name: Run store tests
              run: make pkg-integration-test PKG=./pkg/store
            - name: Run migrate tests
              run: make pkg-integration-test PKG=./pkg/schema/migrate
            - name: Run 1-1-restore tests
              run: make pkg-integration-test TABLETS=${{ env.tablets }} BACKUP_PROVIDER=${{ env.backup-provider }} PKG=./pkg/service/one2onerestore
            - name: Verify SM server startup
              run: make run-server SSL_ENABLED=${{ env.ssl-enabled }} IP_FAMILY=${{ env.ip-family }}
name: integration-tests-2025.3.7-IPV6-nossl-rclone-rclone-localstorage
"on":
    pull_request:
        paths-ignore:
            - docs/**
        types:
            - opened
            - synchronize
            - reopened
    push:
        branches:
            - master
            - branch-**
        paths-ignore:
            - docs/**
permissions:
    contents: read
