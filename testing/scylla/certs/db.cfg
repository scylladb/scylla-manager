[ req ]
default_bits = 4096
default_keyfile = db.key
distinguished_name = req_distinguished_name
req_extensions = v3_req
prompt = no
[ req_distinguished_name ]
C = US
ST = Scylla
L = Scylla
O = Scylla
OU = Scylla
CN= db.scylla.com
[v3_ca]
subjectKeyIdentifier=hash
authorityKeyIdentifier=keyid:always,issuer:always
basicConstraints = CA:true
[v3_req]
# Extensions to add to a certificate request
basicConstraints = CA:FALSE
keyUsage = nonRepudiation, digitalSignature, keyEncipherment
subjectAltName = @alt_names

[alt_names]
DNS.1 = db.scylla.com
IP.1 = 127.0.0.1
IP.2 = 192.168.200.11
IP.3 = 192.168.200.12
IP.4 = 192.168.200.13
IP.5 = 192.168.200.21
IP.6 = 192.168.200.22
IP.7 = 192.168.200.23
IP.8 = 192.168.200.31
IP.9 = 192.168.200.32
IP.10 = 192.168.100.99
IP.11 = 192.168.200.100
IP.12 = 2001:0DB9:200::11
IP.13 = 2001:0DB9:200::12
IP.14 = 2001:0DB9:200::13
IP.15 = 2001:0DB9:200::21
IP.16 = 2001:0DB9:200::22
IP.17 = 2001:0DB9:200::23
IP.18 = 2001:0DB9:200::31
IP.19 = 2001:0DB9:200::32
IP.20 = 2001:0DB9:100::99
IP.21 = 2001:0DB9:200::100
